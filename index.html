<!doctype html>
<html lang="en" data-theme="dark">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>ZERUX IA</title>
  <style>
    /* Pre-React styling to avoid white flash during Vite dev loading */
    html,
    body {
      background-color: #141618;
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
    }

    #root:empty {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100%;
      color: #8ab8c0;
    }

    .app-loader {
      width: 32px;
      height: 32px;
      border: 3px solid rgba(138, 184, 192, 0.2);
      border-top-color: #8ab8c0;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }
  </style>
</head>

<body>
  <div id="root">
    <div class="app-loader"></div>
  </div>
  <script type="module" src="/src/main.jsx"></script>
</body>

</html>
